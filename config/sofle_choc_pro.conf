# ── Sofle Choc Pro BT — config/sofle_choc_pro.conf ────────────────────────────
# This single file applies to BOTH sofle_choc_pro_left and sofle_choc_pro_right
# builds (they are siblings of the same board identifier). Settings that only
# apply to one role (e.g. central-only battery fetching, display-only options)
# are safely inert on the other role — ZMK/Kconfig gates them internally.

# ── Original keebart template options (kept as reference / defaults) ─────────

# Enable mouse emulation.
# CONFIG_ZMK_POINTING=y

# Change idle settings
# CONFIG_ZMK_IDLE_TIMEOUT=30000

# Deep sleep settings
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000

# Custom keyboard name (max. 16 characters)
CONFIG_ZMK_KEYBOARD_NAME="Sofle END"

# ── Display (Option A: built-in status screen instead of nice_view_disp's ───
# ── custom widget) ────────────────────────────────────────────────────────────
# Only takes effect on sofle_choc_pro_left, since that is the only half built
# with the nice_view_disp shield (see build.yaml). Harmless no-op on the right
# half, which has CONFIG_ZMK_DISPLAY off entirely once the shield is removed
# from its build.yaml entry.
#
# - Switches away from nice_view_disp's custom widget (which has no peripheral
#   battery display and bakes the WPM graph into the same canvas as the
#   battery/output icons) to ZMK's plain, individually-configurable screen.
# - keebart's own Kconfig.defconfig for nice_view_disp already pre-selects the
#   Montserrat 26 font for this exact scenario, so no extra font config is
#   needed here.
CONFIG_ZMK_DISPLAY_STATUS_SCREEN_BUILT_IN=y

# Turns off the WPM widget and its underlying data feed -- this removes the
# typing-speed number and animated graph entirely.
CONFIG_ZMK_WIDGET_WPM_STATUS=n

# Enables the central (left) half to fetch the peripheral's (right) battery
# level over the split BLE link, so the on-device battery widget shows both
# halves' charge levels instead of just its own.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# ── Key overrides (required for the ported ENDE/SYM/NAV keymap) ──────────────
# The .keymap file's key_overrides node needs this symbol enabled on ZMK
# builds where it is not already implied by default.
CONFIG_ZMK_KEY_OVERRIDE=y

# ── Combo tuning ───────────────────────────────────────────────────────────────
# Matches the 3-key DCL combo (D+C+L -> Enter) used in the ENDE layer.
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=3

# ── Bluetooth / power (carried over from the earlier draft config) ───────────
CONFIG_ZMK_BLE_PASSKEY_ENTRY=n
CONFIG_ZMK_IDLE_TIMEOUT=300000
CONFIG_ZMK_SLEEP=y
CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=900000
