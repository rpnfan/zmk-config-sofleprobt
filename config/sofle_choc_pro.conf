# ── Sofle Choc Pro BT — config/sofle_choc_pro.conf ────────────────────────────
# This single file applies to BOTH sofle_choc_pro_left and sofle_choc_pro_right
# builds (they are siblings of the same board identifier). Settings that only
# apply to one role (e.g. central-only battery fetching, display-only options)
# are safely inert on the other role — ZMK/Kconfig gates them internally.

# ── Original keebart template options (kept as reference / defaults) ─────────

# Enable mouse emulation.
# CONFIG_ZMK_POINTING=y

# Change idle settings
# CONFIG_ZMK_IDLE_TIMEOUT=30000

# Deep sleep settings
# CONFIG_ZMK_SLEEP=y
# CONFIG_ZMK_IDLE_SLEEP_TIMEOUT=10000000

# Custom keyboard name (max. 16 characters)
CONFIG_ZMK_KEYBOARD_NAME="Sofle Pro BT"

# Enables the central (left) half to fetch the peripheral's (right) battery
# level over the split BLE link, so the on-device battery widget shows both
# halves' charge levels instead of just its own.
CONFIG_ZMK_SPLIT_BLE_CENTRAL_BATTERY_LEVEL_FETCHING=y

# ── Combo tuning ───────────────────────────────────────────────────────────────
# Matches the 3-key DCL combo (D+C+L -> Enter) used in the ENDE layer.
CONFIG_ZMK_COMBO_MAX_KEYS_PER_COMBO=3

CONFIG_ZMK_WIDGET_WPM_STATUS=n
